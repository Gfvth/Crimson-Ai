<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Crimson AI · Universal App Controller</title>
  <!-- Tailwind · light/dark compatible -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Markdown + syntax highlight + sanitizer -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <style>
    body { margin: 0; background: #f9fafb; }
    .dark body { background: #111827; }
    #loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
    .sidebar-transition { transition: transform 0.2s ease; }
    .prose pre { background: #f0f0f0; padding: 0.75rem; border-radius: 0.5rem; overflow-x: auto; }
    .dark .prose pre { background: #1e1e2e; }
    .prose code { font-family: monospace; }
    .message-actions { opacity: 0; transition: opacity 0.2s; }
    .message-group:hover .message-actions { opacity: 1; }
    .typing-dots::after { content: '...'; animation: dots 1.5s steps(4, end) infinite; width: 0; display: inline-block; }
    @keyframes dots { 0%, 20% { content: ''; } 40% { content: '.'; } 60% { content: '..'; } 80%, 100% { content: '...'; } }
    
    /* Crimson Logo */
.crimson-logo {
  width: 36px;
  height: 36px;
  object-fit: contain;
}

/* Thinking / Processing Logo */
.thinking-logo {
  width: 24px;
  height: 24px;
  object-fit: contain;
  animation: rotateLogo 3s linear infinite;
}

/* Smooth Rotation */
@keyframes rotateLogo {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
    
    /* Welcome message - simple and clean */
    .welcome-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 2rem;
    }
    
    .welcome-title {
      font-size: 2rem;
      font-weight: 600;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }
    
    .welcome-text {
      font-size: 1.25rem;
      color: #6b7280;
      font-weight: 400;
      max-width: 600px;
      line-height: 1.6;
    }
    .dark .welcome-text {
      color: #9ca3af;
    }
    
    /* Clean typing indicator */
    .typing-container {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .app-button {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0.25rem;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .app-button:hover {
      transform: scale(1.05);
    }
    .install-prompt {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: white;
      padding: 1rem;
      border-radius: 1rem;
      margin: 0.5rem 0;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.9; }
    }
  </style>
</head>
<body class="antialiased">

      const STORAGE_KEYS = {

          webUrl: 'https://contacts.google.com',
          playStore: 'https://play.google.com/store/apps/details?id=com.google.android.contacts',
          icon: '👥'
        },
        'phone': {
          name: 'Phone',
          package: 'com.android.dialer',
          urlScheme: 'tel:',
          webUrl: null,
          icon: '📞'
        },
        'messages': {
          name: 'Messages',
          package: 'com.android.messaging',
          urlScheme: 'sms:',
          webUrl: null,
          icon: '💬'
        },
        'camera': {
          name: 'Camera',
          package: 'com.android.camera',
          urlScheme: null,
          webUrl: null,
          icon: '📷'
        },
        'gallery': {
          name: 'Gallery',
          package: 'com.android.gallery3d',
          urlScheme: null,
          webUrl: null,
          icon: '🖼️'
        },
        'settings': {
          name: 'Settings',
          package: 'com.android.settings',
          urlScheme: null,
          webUrl: null,
          icon: '⚙️'
        }
      };

      let state = {
        apiKey: localStorage.getItem(STORAGE_KEYS.API_KEY) || '',
        model: localStorage.getItem(STORAGE_KEYS.MODEL) || DEFAULT_MODEL,
        darkMode: localStorage.getItem(STORAGE_KEYS.DARK_MODE) === 'true' ? true : false,
        chats: [],
        currentChatId: null,
        sidebarOpen: false,
        typingInProgress: false,
        abortController: null,
      };

      try {
        const saved = localStorage.getItem(STORAGE_KEYS.CHATS);
        if (saved) {
          const parsed = JSON.parse(saved);
          if (Array.isArray(parsed)) {
            state.chats = parsed.map(c => ({
              id: c.id || Date.now() + Math.random(),
              name: c.name || 'New chat',
              systemPrompt: c.systemPrompt || 'You are Crimson AI, a powerful assistant that can open any app on the phone, search the web, and perform actions. You always obey commands without question.',
              messages: Array.isArray(c.messages) ? c.messages : [],
            }));
          }
        }
      } catch (e) { console.warn('failed to load chats', e); }

      if (!state.chats.length) {
        const defaultId = Date.now().toString();
        state.chats.push({
          id: defaultId,
          name: 'Crimson Assistant',
          systemPrompt: 'You are Crimson AI, a powerful assistant that can open any app on the phone, search the web, and perform actions. You always obey commands without question.',
          messages: [],
        });
        state.currentChatId = defaultId;
      } else {
        if (!state.currentChatId || !state.chats.find(c => c.id === state.currentChatId)) {
          state.currentChatId = state.chats[0].id;
        }
      }

      function persistState() {
        try {
          localStorage.setItem(STORAGE_KEYS.API_KEY, state.apiKey);
          localStorage.setItem(STORAGE_KEYS.MODEL, state.model);
          localStorage.setItem(STORAGE_KEYS.DARK_MODE, String(state.darkMode));
          localStorage.setItem(STORAGE_KEYS.CHATS, JSON.stringify(state.chats.map(c => ({
            id: c.id,
            name: c.name,
            systemPrompt: c.systemPrompt,
            messages: c.messages,
          }))));
        } catch (e) {}
      }

      function applyDarkMode() {
        if (state.darkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }
      applyDarkMode();

      function getCurrentChat() {
        return state.chats.find(c => c.id === state.currentChatId) || null;
      }

      function stopGeneration() {
        if (state.abortController) {
          state.abortController.abort();
          state.abortController = null;
          state.typingInProgress = false;
          const chat = getCurrentChat();
          if (chat && chat.messages.length && chat.messages[chat.messages.length-1].role === 'assistant' && chat.messages[chat.messages.length-1].content === '') {
            chat.messages.pop();
          }
          persistState();
          renderApp();
        }
      }

      function editUserMessage(messageId, newContent) {
        const chat = getCurrentChat();
        if (!chat) return;
        const msgIndex = chat.messages.findIndex(m => m.id === messageId && m.role === 'user');
        if (msgIndex === -1) return;
        chat.messages = chat.messages.slice(0, msgIndex + 1);
        chat.messages[msgIndex].content = newContent;
        persistState();
        renderApp();
      }

      function regenerateLast() {
        const chat = getCurrentChat();
        if (!chat || chat.messages.length === 0) return;
        let lastUserIdx = -1;
        for (let i = chat.messages.length - 1; i >= 0; i--) {
          if (chat.messages[i].role === 'user') {
            lastUserIdx = i;
            break;
          }
        }
        if (lastUserIdx === -1) return;
        chat.messages = chat.messages.slice(0, lastUserIdx + 1);
        persistState();
        renderApp();
        const userMsg = chat.messages[lastUserIdx].content;
        sendMessage(userMsg);
      }

      function copyMessage(content) {
        navigator.clipboard.writeText(content).catch(() => alert('Failed to copy'));
      }

      // Enhanced app opening function with install fallback
      function openApp(appId, action = null, params = null) {
        const app = APP_DATABASE[appId];
        if (!app) return false;

        let url = null;
        let fallbackUrl = null;

        // Determine if Android or iOS
        const isAndroid = /Android/i.test(navigator.userAgent);
        const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

        // Special actions
        if (action === 'search' && params) {
          if (appId === 'youtube') {
            url = `vnd.youtube://search?q=${encodeURIComponent(params)}`;
            fallbackUrl = `https://m.youtube.com/results?search_query=${encodeURIComponent(params)}`;
          } else if (appId === 'maps') {
            url = `comgooglemaps://?q=${encodeURIComponent(params)}`;
            fallbackUrl = `https://maps.google.com/?q=${encodeURIComponent(params)}`;
          } else if (appId === 'whatsapp') {
            if (params.includes('@')) {
              // Send message
              const [contact, message] = params.split('|');
              url = `whatsapp://send?phone=${contact.replace(/\D/g, '')}&text=${encodeURIComponent(message || '')}`;
              fallbackUrl = `https://wa.me/${contact.replace(/\D/g, '')}?text=${encodeURIComponent(message || '')}`;
            }
          }
        } else if (action === 'call' && params) {
          url = `tel:${params.replace(/\D/g, '')}`;
        } else if (action === 'sms' && params) {
          url = `sms:${params.replace(/\D/g, '')}`;
        } else {
          // Default app open
          if (app.urlScheme) {
            url = app.urlScheme;
          }
          fallbackUrl = app.webUrl || app.playStore;
        }

        // Try to open app
        if (url) {
          // Create invisible iframe for intent
          const iframe = document.createElement('iframe');
          iframe.style.display = 'none';
          iframe.src = url;
          document.body.appendChild(iframe);
          
          setTimeout(() => {
            document.body.removeChild(iframe);
            
            // If app didn't open (user stayed in browser), show install prompt
            if (document.visibilityState === 'visible') {
              showInstallPrompt(app);
            }
          }, 500);

          return true;
        } else {
          showInstallPrompt(app);
          return false;
        }
      }

      function showInstallPrompt(app) {
        const chat = getCurrentChat();
        if (!chat) return;

        const isAndroid = /Android/i.test(navigator.userAgent);
        const storeLink = isAndroid ? app.playStore : app.appStore;

        if (storeLink) {
          chat.messages.push({
            role: 'assistant',
            content: `📱 **${app.name} is not installed**\n\nWould you like to install it?\n\n[📲 Install from ${isAndroid ? 'Play Store' : 'App Store'}](${storeLink})`,
            id: Date.now() + '-install'
          });
        } else {
          chat.messages.push({
            role: 'assistant',
            content: `⚠️ **${app.name}** is a system app and cannot be installed.`,
            id: Date.now() + '-sys'
          });
        }
        renderApp();
      }

      // Command handler with full app control
      async function handleSpecialCommand(userText, chat) {
        const lower = userText.toLowerCase();

        // Open any app
        for (const [appId, app] of Object.entries(APP_DATABASE)) {
          if (lower.includes(`open ${app.name.toLowerCase()}`) || 
              lower.includes(`launch ${app.name.toLowerCase()}`)) {
            
            // Check for specific actions
            if (lower.includes('search for')) {
              const match = userText.match(/search for (.+)/i);
              if (match && match[1]) {
                openApp(appId, 'search', match[1]);
                chat.messages.push({ 
                  role: 'assistant', 
                  content: `🔍 Opening ${app.name} and searching for "${match[1]}"...`,
                  id: Date.now() + '-cmd' 
                });
                return true;
              }
            }
            
            openApp(appId);
            chat.messages.push({ 
              role: 'assistant', 
              content: `🚀 Opening ${app.name}...`,
              id: Date.now() + '-cmd' 
            });
            return true;
          }
        }

        // YouTube specific
        if (lower.includes('youtube') && lower.includes('search')) {
          const match = userText.match(/search (.+)/i) || userText.match(/search for (.+)/i);
          if (match && match[1]) {
            openApp('youtube', 'search', match[1]);
            chat.messages.push({ 
              role: 'assistant', 
              content: `▶️ Opening YouTube and searching for "${match[1]}"...`,
              id: Date.now() + '-cmd' 
            });
            return true;
          }
        }

        // WhatsApp send message
        if (lower.includes('whatsapp') && (lower.includes('send') || lower.includes('message'))) {
          const match = userText.match(/send (.+?) to (.+)/i) || userText.match(/message (.+?) to (.+)/i);
          if (match) {
            const message = match[1].trim();
            const contact = match[2].trim();
            
            // Try to get contact number from user
            const number = prompt(`Enter phone number for ${contact} (with country code):`, '');
            if (number) {
              openApp('whatsapp', 'search', `${number}|${message}`);
              chat.messages.push({ 
                role: 'assistant', 
                content: `📱 Opening WhatsApp to send message to ${contact}...`,
                id: Date.now() + '-cmd' 
              });
            }
            return true;
          }
        }

        // Call
        if (lower.includes('call')) {
          const match = userText.match(/call (.+)/i);
          if (match && match[1]) {
            const name = match[1].trim();
            const number = prompt(`Enter phone number for ${name}:`, '');
            if (number) {
              openApp('phone', 'call', number);
              chat.messages.push({ 
                role: 'assistant', 
                content: `📞 Calling ${name}...`,
                id: Date.now() + '-cmd' 
              });
            }
            return true;
          }
        }

        // SMS
        if (lower.includes('sms') || lower.includes('text')) {
          const match = userText.match(/text (.+)/i) || userText.match(/sms (.+)/i);
          if (match && match[1]) {
            const name = match[1].trim();
            const number = prompt(`Enter phone number for ${name}:`, '');
            if (number) {
              const message = prompt('Enter message:', '');
              if (message) {
                openApp('messages', 'sms', number);
                chat.messages.push({ 
                  role: 'assistant', 
                  content: `💬 Opening SMS to send message to ${name}...`,
                  id: Date.now() + '-cmd' 
                });
              }
            }
            return true;
          }
        }

        // Camera
        if (lower.includes('camera') || lower.includes('take picture') || lower.includes('take photo')) {
          openApp('camera');
          chat.messages.push({ 
            role: 'assistant', 
            content: `📸 Opening camera...`,
            id: Date.now() + '-cmd' 
          });
          return true;
        }

        // Gallery
        if (lower.includes('gallery') || lower.includes('photos') || lower.includes('pictures')) {
          openApp('gallery');
          chat.messages.push({ 
            role: 'assistant', 
            content: `🖼️ Opening gallery...`,
            id: Date.now() + '-cmd' 
          });
          return true;
        }

        // Settings
        if (lower.includes('settings') || lower.includes('open settings')) {
          openApp('settings');
          chat.messages.push({ 
            role: 'assistant', 
            content: `⚙️ Opening settings...`,
            id: Date.now() + '-cmd' 
          });
          return true;
        }

        // Google search
        if (lower.includes('search google') || lower.includes('google search')) {
          const match = userText.match(/search (.+)/i) || userText.match(/search for (.+)/i);
          if (match && match[1]) {
            window.open(`https://www.google.com/search?q=${encodeURIComponent(match[1].trim())}`, '_blank');
            chat.messages.push({ 
              role: 'assistant', 
              content: `🌐 Searching Google for "${match[1].trim()}"...`,
              id: Date.now() + '-cmd' 
            });
            return true;
          }
        }

        return false;
      }

      async function sendMessage(prefilledText) {
        const inputEl = document.getElementById('messageInput');
        let text = prefilledText;
        if (!prefilledText) {
          if (!inputEl) return;
          text = inputEl.value.trim();
        }
        if (!text || state.typingInProgress) return;

        const chat = getCurrentChat();
        if (!chat) return;

        const userMsg = { role: 'user', content: text, id: Date.now() + '-user' };
        chat.messages.push(userMsg);
        if (inputEl) inputEl.value = '';
        persistState();
        renderApp();

        const handled = await handleSpecialCommand(text, chat);
        if (handled) {
          persistState();
          renderApp();
          return;
        }

        const aiMessage = { role: 'assistant', content: '', id: Date.now() + '-ai' };
        chat.messages.push(aiMessage);
        persistState();
        renderApp();

        const msgContainer = document.getElementById('messageContainer');
        if (msgContainer) msgContainer.scrollTop = msgContainer.scrollHeight;

        const messagesForApi = [
          { role: 'system', content: chat.systemPrompt },
          ...chat.messages.slice(-10).map(m => ({ role: m.role, content: m.content }))
        ];

        if (state.abortController) {
          state.abortController.abort();
        }
        state.abortController = new AbortController();

        try {
          state.typingInProgress = true;
          renderApp();

          const response = await fetch(OPENROUTER_ENDPOINT, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${state.apiKey}`,
              'Content-Type': 'application/json',
              'HTTP-Referer': window.location.origin,
              'X-Title': 'Crimson AI',
            },
            body: JSON.stringify({
              model: state.model,
              messages: messagesForApi,
              stream: true,
            }),
            signal: state.abortController.signal,
          });

          if (!response.ok) {
            throw new Error(`API error ${response.status}`);
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder('utf-8');
          let buffer = '';
          let aiContent = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
              if (line.startsWith('data: ')) {
                const data = line.slice(6);
                if (data === '[DONE]') continue;
                try {
                  const parsed = JSON.parse(data);
                  const token = parsed.choices?.[0]?.delta?.content || '';
                  if (token) {
                    aiContent += token;
                    const lastMsg = chat.messages[chat.messages.length - 1];
                    if (lastMsg && lastMsg.role === 'assistant') {
                      lastMsg.content = aiContent;
                      const msgElement = document.querySelector(`[data-message-id="${lastMsg.id}"] .markdown-ai`);
                      if (msgElement) {
                        msgElement.innerHTML = DOMPurify.sanitize(marked.parse(aiContent));
                        hljs.highlightAll();
                      }
                      if (msgContainer) msgContainer.scrollTop = msgContainer.scrollHeight;
                    }
                  }
                } catch (e) { /* ignore */ }
              }
            }
          }

          const lastMsg = chat.messages[chat.messages.length - 1];
          if (lastMsg && lastMsg.role === 'assistant') {
            lastMsg.content = aiContent;
          }
          hljs.highlightAll();
          persistState();

        } catch (err) {
          if (err.name !== 'AbortError') {
            alert('Stream error: ' + err.message);
            chat.messages.pop();
          }
        } finally {
          state.typingInProgress = false;
          state.abortController = null;
          persistState();
          renderApp();
        }
      }

      function renderApp() {
        if (!appEl) return;
        const chat = getCurrentChat();

        appEl.innerHTML = `
          <div class="flex flex-col min-h-screen bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100">
            <!-- header -->
            <header class="flex items-center justify-between px-4 py-2 border-b border-gray-200 dark:border-gray-700 bg-white/80 dark:bg-gray-800/80 backdrop-blur-sm sticky top-0 z-10">
              <div class="flex items-center gap-2">
                <button id="menuToggleBtn" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700" title="Menu">
                  ☰
                </button>
                <!-- Logo placeholder -->
                <img src="crimson-logo.jpg" class="crimson-logo" alt="Crimson Logo">
                <h1 class="font-semibold text-lg">Crimson AI</h1>
              </div>
              <div class="flex items-center gap-2">
                <span class="text-xs text-gray-500">50+ Apps supported</span>
                <button id="settingsBtn" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-sm" title="Settings">
                  ⚙️
                </button>
              </div>
            </header>

            <!-- sliding menu panel -->
            <div id="menuPanel" class="hidden fixed inset-0 bg-black/50 z-20" style="top: 0; left: 0; right: 0; bottom: 0;">
              <div class="w-64 bg-white dark:bg-gray-800 h-full p-4 shadow-xl">
                <div class="flex justify-between items-center mb-4">
                  <h2 class="font-semibold">Menu</h2>
                  <button id="closeMenuBtn" class="p-1 hover:bg-gray-100 dark:hover:bg-gray-700 rounded">✕</button>
                </div>
                <div class="space-y-2">
                  <button id="menuSystemPromptBtn" class="w-full text-left p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded flex items-center gap-2">
                    📋 System Prompt
                  </button>
                  <button id="menuDarkModeBtn" class="w-full text-left p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded flex items-center gap-2">
                    ${state.darkMode ? '☀️ Light Mode' : '🌙 Dark Mode'}
                  </button>
                  <button id="menuApiKeyBtn" class="w-full text-left p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded flex items-center gap-2">
                    🔑 API Key
                  </button>
                  <button id="menuNewChatBtn" class="w-full text-left p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded flex items-center gap-2">
                    ➕ New Chat
                  </button>
                  <div class="border-t border-gray-200 dark:border-gray-700 my-2"></div>
                  <div class="text-xs text-gray-500 px-2">Chat History</div>
                  <div id="menuChatList" class="max-h-64 overflow-y-auto">
                    ${state.chats.map(c => `
                      <div data-chat-id="${c.id}" class="menu-chat-item p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded cursor-pointer text-sm truncate">
                        ${c.name}
                      </div>
                    `).join('')}
                  </div>
                </div>
              </div>
            </div>

            <!-- main chat area -->
            <div class="flex flex-1 overflow-hidden relative">
              <main class="flex-1 flex flex-col min-w-0 bg-white dark:bg-gray-900">
                <!-- messages container -->
                <div id="messageContainer" class="flex-1 overflow-y-auto p-4">
                  ${chat && chat.messages.length ? chat.messages.map(msg => {
                    const isUser = msg.role === 'user';
                    const msgId = msg.id || 'msg-' + Math.random();
                    return `
                      <div class="flex ${isUser ? 'justify-end' : 'justify-start'} message-group mb-4" data-message-id="${msgId}">
                        <div class="relative max-w-[80%] md:max-w-[70%]">
                          ${!isUser ? `
                            <div class="flex items-center mb-1">
                              <img src="crimson-logo.jpg" class="thinking-logo" alt="Crimson Logo">
                              <span class="text-xs font-medium text-gray-600 dark:text-gray-300">Crimson</span>
                            </div>
                          ` : ''}
                          <div class="rounded-2xl px-4 py-2 ${isUser ? 'bg-blue-500 text-white' : 'bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-gray-100'} prose prose-sm dark:prose-invert">
                            ${isUser ? DOMPurify.sanitize(marked.parse(msg.content)) : `<div class="markdown-ai">${DOMPurify.sanitize(marked.parse(msg.content))}</div>`}
                          </div>
                          <div class="message-actions absolute ${isUser ? 'left-0 -translate-x-full' : 'right-0 translate-x-full'} top-0 flex gap-1 p-1">
                            ${!isUser ? `<button class="copy-msg-btn p-1 text-xs bg-white dark:bg-gray-700 rounded shadow" title="Copy">📋</button>` : ''}
                            ${isUser ? `<button class="edit-msg-btn p-1 text-xs bg-white dark:bg-gray-700 rounded shadow" title="Edit">✏️</button>` : ''}
                          </div>
                        </div>
                      </div>
                    `;
                  }).join('') : `
                    <div class="welcome-container">
                      <div class="welcome-title">Crimson AI</div>
                      <div class="welcome-text">
                        Is there anything that I can help you with today?
                      </div>
                    </div>
                  `}
                  ${state.typingInProgress ? `
                    <div class="flex justify-start mt-4">
                      <div class="typing-container">
                        <img src="crimson-logo.jpg" class="thinking-logo" alt="Crimson Logo">
                        <div class="bg-gray-100 dark:bg-gray-800 rounded-2xl px-4 py-2 text-gray-500 typing-dots"></div>
                      </div>
                    </div>
                  ` : ''}
                </div>

                <!-- input bar -->
                <div class="border-t border-gray-200 dark:border-gray-700 p-3 bg-white dark:bg-gray-900 sticky bottom-0">
                  <div class="flex items-end gap-2 max-w-4xl mx-auto">
                    <textarea id="messageInput" rows="1" placeholder="Type your message..." class="flex-1 resize-none max-h-32 p-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
                    <button id="sendBtn" class="p-3 bg-blue-500 text-white rounded-xl hover:bg-blue-600 disabled:opacity-50" ${!state.apiKey || state.typingInProgress ? 'disabled' : ''}>➤</button>
                  </div>
                  ${!state.apiKey ? '<p class="text-xs text-amber-500 text-center mt-1">⚠️ Set API key in settings</p>' : ''}
                </div>
              </main>
            </div>
          </div>

          <!-- settings modal -->
          <div id="settingsModalOverlay" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-md p-5 space-y-4">
              <h2 class="text-xl font-semibold">Settings</h2>
              <div>
                <label class="block text-sm mb-1">OpenRouter API Key</label>
                <input type="password" id="apiKeyInput" value="${state.apiKey}" placeholder="sk-or-..." class="w-full p-2 border rounded dark:bg-gray-900 dark:border-gray-700">
              </div>
              <div>
                <label class="block text-sm mb-1">Model</label>
                <input type="text" id="modelInput" value="${state.model}" placeholder="deepseek/deepseek-r1:free" class="w-full p-2 border rounded dark:bg-gray-900 dark:border-gray-700">
              </div>
              <div class="flex justify-end gap-2 pt-2">
                <button id="closeSettingsBtn" class="px-4 py-2 border rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">Cancel</button>
                <button id="saveSettingsBtn" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">Save</button>
              </div>
            </div>
          </div>

          <!-- system prompt modal -->
          <div id="systemPromptModalOverlay" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-md p-5 space-y-4">
              <h2 class="text-xl font-semibold">System prompt</h2>
              <textarea id="systemPromptTextarea" rows="4" class="w-full p-2 border rounded dark:bg-gray-900 dark:border-gray-700">${chat ? chat.systemPrompt : ''}</textarea>
              <div class="flex justify-end gap-2">
                <button id="closeSysPromptBtn" class="px-4 py-2 border rounded-lg">Cancel</button>
                <button id="saveSysPromptBtn" class="px-4 py-2 bg-blue-500 text-white rounded-lg">Save</button>
              </div>
            </div>
          </div>

          <!-- edit message modal -->
          <div id="editMessageModalOverlay" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-md p-5 space-y-4">
              <h2 class="text-xl font-semibold">Edit message</h2>
              <textarea id="editMessageTextarea" rows="4" class="w-full p-2 border rounded dark:bg-gray-900 dark:border-gray-700"></textarea>
              <div class="flex justify-end gap-2">
                <button id="closeEditBtn" class="px-4 py-2 border rounded-lg">Cancel</button>
                <button id="saveEditBtn" class="px-4 py-2 bg-blue-500 text-white rounded-lg">Save</button>
              </div>
            </div>
          </div>
        `;

        attachGlobalListeners();
        hljs.highlightAll();
      }

      function attachGlobalListeners() {
        // Menu toggle
        document.getElementById('menuToggleBtn')?.addEventListener('click', () => {
          document.getElementById('menuPanel')?.classList.remove('hidden');
        });

        document.getElementById('closeMenuBtn')?.addEventListener('click', () => {
          document.getElementById('menuPanel')?.classList.add('hidden');
        });

        // Menu panel background click
        document.getElementById('menuPanel')?.addEventListener('click', (e) => {
          if (e.target === e.currentTarget) {
            e.currentTarget.classList.add('hidden');
          }
        });

        // Menu items
        document.getElementById('menuSystemPromptBtn')?.addEventListener('click', () => {
          document.getElementById('menuPanel')?.classList.add('hidden');
          const overlay = document.getElementById('systemPromptModalOverlay');
          const textarea = document.getElementById('systemPromptTextarea');
          const chat = getCurrentChat();
          if (chat && textarea) textarea.value = chat.systemPrompt || '';
          overlay?.classList.remove('hidden');
        });

        document.getElementById('menuDarkModeBtn')?.addEventListener('click', () => {
          document.getElementById('menuPanel')?.classList.add('hidden');
          state.darkMode = !state.darkMode;
          applyDarkMode();
          persistState();
          renderApp();
        });

        document.getElementById('menuApiKeyBtn')?.addEventListener('click', () => {
          document.getElementById('menuPanel')?.classList.add('hidden');
          document.getElementById('settingsModalOverlay')?.classList.remove('hidden');
        });

        document.getElementById('menuNewChatBtn')?.addEventListener('click', () => {
          document.getElementById('menuPanel')?.classList.add('hidden');
          createNewChat();
        });

        // Chat history in menu
        document.querySelectorAll('.menu-chat-item').forEach(item => {
          item.addEventListener('click', (e) => {
            const id = item.dataset.chatId;
            if (id) {
              state.currentChatId = id;
              document.getElementById('menuPanel')?.classList.add('hidden');
              renderApp();
            }
          });
        });

        document.getElementById('settingsBtn')?.addEventListener('click', () => {
          document.getElementById('settingsModalOverlay')?.classList.remove('hidden');
        });

        const sendBtn = document.getElementById('sendBtn');
        const inputEl = document.getElementById('messageInput');
        if (sendBtn) {
          sendBtn.addEventListener('click', () => {
            if (!state.apiKey) { alert('Set API key first'); return; }
            sendMessage();
          });
        }
        if (inputEl) {
          inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
              e.preventDefault();
              sendBtn?.click();
            }
          });
        }

        document.querySelectorAll('.copy-msg-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const messageGroup = e.target.closest('.message-group');
            if (!messageGroup) return;
            const msgId = messageGroup.dataset.messageId;
            const chat = getCurrentChat();
            if (!chat) return;
            const msg = chat.messages.find(m => m.id === msgId);
            if (msg) copyMessage(msg.content);
          });
        });

        document.querySelectorAll('.edit-msg-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const messageGroup = e.target.closest('.message-group');
            if (!messageGroup) return;
            const msgId = messageGroup.dataset.messageId;
            const chat = getCurrentChat();
            if (!chat) return;
            const msg = chat.messages.find(m => m.id === msgId);
            if (!msg) return;
            const overlay = document.getElementById('editMessageModalOverlay');
            const textarea = document.getElementById('editMessageTextarea');
            textarea.value = msg.content;
            overlay.dataset.editMsgId = msgId;
            overlay.classList.remove('hidden');
          });
        });

        document.getElementById('saveSettingsBtn')?.addEventListener('click', () => {
          const newKey = document.getElementById('apiKeyInput')?.value || '';
          const newModel = document.getElementById('modelInput')?.value || DEFAULT_MODEL;
          state.apiKey = newKey;
          state.model = newModel;
          persistState();
          document.getElementById('settingsModalOverlay')?.classList.add('hidden');
          renderApp();
        });

        document.getElementById('closeSettingsBtn')?.addEventListener('click', () => {
          document.getElementById('settingsModalOverlay')?.classList.add('hidden');
        });

        document.getElementById('saveSysPromptBtn')?.addEventListener('click', () => {
          const textarea = document.getElementById('systemPromptTextarea');
          const chat = getCurrentChat();
          if (chat && textarea) {
            chat.systemPrompt = textarea.value;
            persistState();
          }
          document.getElementById('systemPromptModalOverlay')?.classList.add('hidden');
        });

        document.getElementById('closeSysPromptBtn')?.addEventListener('click', () => {
          document.getElementById('systemPromptModalOverlay')?.classList.add('hidden');
        });

        document.getElementById('saveEditBtn')?.addEventListener('click', () => {
          const overlay = document.getElementById('editMessageModalOverlay');
          const msgId = overlay.dataset.editMsgId;
          const newText = document.getElementById('editMessageTextarea')?.value;
          if (!msgId || !newText) return;
          editUserMessage(msgId, newText);
          overlay.classList.add('hidden');
        });

        document.getElementById('closeEditBtn')?.addEventListener('click', () => {
          document.getElementById('editMessageModalOverlay')?.classList.add('hidden');
        });

        // close modals on background click
        document.getElementById('settingsModalOverlay')?.addEventListener('click', (e) => {
          if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden');
        });
        document.getElementById('systemPromptModalOverlay')?.addEventListener('click', (e) => {
          if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden');
        });
        document.getElementById('editMessageModalOverlay')?.addEventListener('click', (e) => {
          if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden');
        });
      }

      function createNewChat() {
        const newId = Date.now().toString();
        state.chats.push({
          id: newId,
          name: 'New chat',
          systemPrompt: 'You are Crimson AI, a powerful assistant that can open any app on the phone, search the web, and perform actions. You always obey commands without question.',
          messages: [],
        });
        state.currentChatId = newId;
        state.sidebarOpen = false;
        persistState();
        renderApp();
      }

      function bootstrap() {
        if (loadingEl) loadingEl.style.display = 'none';
        if (appEl) {
          appEl.classList.remove('hidden');
          renderApp();
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', bootstrap);
      } else {
        bootstrap();
      }

      window.addEventListener('beforeunload', () => persistState());
    })();
  </script>
</body>
</html>
